<!DOCTYPE html>
<html lang="en">
<head>
    <meta content="text/html;charset=utf-8" http-equiv="Content-Type">
    <title>관절연구소</title>
    <link href="style.css" rel="stylesheet">

    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec3 vPosition;
        attribute vec3 vNormal;
        attribute vec2 vTexCoord;
        attribute vec3 vColor;

        uniform mat4 uWorld;
        uniform mat4 uView;
        uniform mat4 uProjection;

        varying vec3 fNormal;
        varying vec3 fPosition;
        varying vec2 fTexCoord;
        varying vec3 fColor;

        void main() {
            vec4 worldPosition = uWorld * vec4(vPosition, 1.0);
            fPosition = worldPosition.xyz;
            fNormal = mat3(uWorld) * vNormal;
            fTexCoord = vTexCoord;
            fColor = vColor;
            gl_Position = uProjection * uView * worldPosition;
            gl_PointSize = 10.0;
        }
    </script>

    <script id="fragment-shader" type="x-shader/x-fragment">
        precision mediump float;

        varying vec3 fNormal;
        varying vec3 fPosition;
        varying vec2 fTexCoord;
        varying vec3 fColor;

        uniform vec3 uLightDirection;
        uniform vec4 uDiffuse;
        uniform vec3 uAmbient;

        void main() {
            vec3 normal = normalize(fNormal);
            float light = dot(normal, normalize(uLightDirection));
            light = max(light, 0.0);

            vec3 diffuseTerm = light * uDiffuse.rgb;
            vec3 ambientTerm = uAmbient;
            vec3 lit = diffuseTerm + ambientTerm;

            vec3 color = fColor * lit;

            gl_FragColor = vec4(color, uDiffuse.a);
        }
    </script>

    <script src="common/webgl-utils.js" type="text/javascript"></script>
    <script src="common/initShaders.js" type="text/javascript"></script>
    <script src="common/m4.js" type="text/javascript"></script>
    <script src="main.js" type="module"></script>
</head>

<body>
<div id="container">
    <canvas height="1024" id="gl-canvas" width="1024"></canvas>
    <div id="model">
        <div><strong>Spider</strong></div>
        <hr>
        Position:<br>
        x: <span id="posX">0</span><br>
        y: <span id="posY">0</span><br>
        z: <span id="posZ">0</span><br>
        <hr>
        Rotation:<br>
        x: <span id="rotX">0</span>°<br>
        y: <span id="rotY">0</span>°<br>
        z: <span id="rotZ">0</span>°<br>
    </div>
    <div id="controller">
        <div><strong>Controller</strong></div>
        <hr>
        Position:<br>
        x: <span id="controllerX">0.00</span><br>
        y: <span id="controllerY">0.00</span><br>
        z: <span id="controllerZ">0.00</span><br>
    </div>
    <div id="debugPanel">
        Debug<br>
        CoxaJoint:<br>
        (<span id="coxaX">0.00</span>,
        <span id="coxaY">0.00</span>,
        <span id="coxaZ">0.00</span>,
        <span id="coxaR">0</span>°)<br>
        FemurJoint:<br>
        (<span id="femurX">0.00</span>,
        <span id="femurY">0.00</span>,
        <span id="femurZ">0.00</span>,
        <span id="femurR">0</span>°)<br>
        TibiaJoint:<br>
        (<span id="tibiaX">0.00</span>,
        <span id="tibiaY">0.00</span>,
        <span id="tibiaZ">0.00</span>,
        <span id="tibiaR">0</span>°)<br>
    </div>
</div>
</body>
</html>
